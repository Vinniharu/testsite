<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funds · NEIIA</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/portal.css">
</head>
<body>
  <div class="portal-shell">
    <aside id="sb" class="portal-sidebar"></aside>
    <div class="portal-main">
      <header id="hdr" class="portal-header"></header>
      <div class="portal-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <div>
            <h1 style="margin:0;font-size:24px;">Funds</h1>
            <p style="margin:4px 0 0;color:var(--muted);">3 funds · $45M AUM · 28 LPs across all funds</p>
          </div>
          <button class="btn btn-primary" id="new-fund-btn"></button>
        </div>

        <div class="card" style="overflow:hidden;">
          <table class="tbl">
            <thead><tr>
              <th>Fund</th><th>Vintage</th><th>Status</th><th>Target</th><th>Raised</th><th>Called</th><th>Distributed</th><th>NAV</th><th>IRR</th><th>MOIC</th>
            </tr></thead>
            <tbody id="funds-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrap"></div>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/portal.js"></script>
  <script>
    Portal.init({ role: 'gp', activeNav: 'funds' });

    function fmtCompact(n) {
      if (n >= 1e6) return '$' + (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + (n || 0).toLocaleString();
    }

    document.getElementById('new-fund-btn').innerHTML = Portal.icon('plus', 16) + ' New fund';

    const tints = ['', 'avatar-blue', 'avatar-amber', 'avatar-purple', 'avatar-teal', 'avatar-rose'];

    const tbody = document.getElementById('funds-tbody');
    tbody.innerHTML = NEIIA_DATA.funds.map(function (f, i) {
      const badge = f.status === 'Active' ? 'badge-green' : (f.status === 'Raising' ? 'badge-amber' : 'badge-slate');
      const irr = f.irr == null ? '—' : f.irr.toFixed(1) + '%';
      return '<tr data-id="' + f.id + '">' +
        '<td><div style="display:flex;align-items:center;gap:10px;"><span class="avatar avatar-sm">' + (f.name.match(/[A-Z]/g) || []).slice(0,2).join('') + '</span><span style="font-weight:600;color:var(--ink);">' + f.name + '</span></div></td>' +
        '<td>' + f.vintage + '</td>' +
        '<td><span class="badge ' + badge + '">' + f.status + '</span></td>' +
        '<td>' + fmtCompact(f.target) + '</td>' +
        '<td>' + fmtCompact(f.raised) + '</td>' +
        '<td>' + fmtCompact(f.called) + '</td>' +
        '<td>' + fmtCompact(f.distributed) + '</td>' +
        '<td>' + fmtCompact(f.nav) + '</td>' +
        '<td style="color:' + (f.irr ? 'var(--brand)' : 'var(--muted)') + ';font-weight:600;">' + irr + '</td>' +
        '<td style="font-weight:600;color:var(--ink);">' + f.moic.toFixed(2) + 'x</td>' +
      '</tr>';
    }).join('');

    tbody.addEventListener('click', function (e) {
      const tr = e.target.closest('tr');
      if (!tr) return;
      const fund = NEIIA_DATA.funds.find(function (f) { return f.id === tr.dataset.id; });
      openFundDrawer(fund);
    });

    function openFundDrawer(f) {
      const irr = f.irr == null ? '—' : f.irr.toFixed(1) + '%';
      const badge = f.status === 'Active' ? 'badge-green' : (f.status === 'Raising' ? 'badge-amber' : 'badge-slate');
      const companies = f.companies.map(function (id, i) {
        const p = NEIIA_DATA.portfolio.find(function (pp) { return pp.id === id; });
        return '<div class="card" style="padding:14px;">' +
          '<div style="display:flex;gap:10px;margin-bottom:8px;align-items:center;">' +
            '<span class="avatar avatar-md ' + tints[i % tints.length] + '">' + p.initials + '</span>' +
            '<div><div style="font-weight:700;color:var(--ink);">' + p.name + '</div>' +
            '<div style="font-size:12px;color:var(--muted);">' + p.stage + ' · ' + p.sector + '</div></div>' +
          '</div>' +
          '<div style="font-size:13px;color:var(--body);line-height:1.5;">' + p.blurb + '</div>' +
          '<div style="font-size:12px;color:var(--muted);margin-top:8px;">Last update: ' + p.update + '</div>' +
        '</div>';
      }).join('');

      const body = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">' +
        '<div><h2 style="margin:0;font-size:20px;">' + f.name + '</h2>' +
        '<div style="font-size:13px;color:var(--muted);margin-top:4px;">Vintage ' + f.vintage + ' · ' + f.strategy + '</div></div>' +
        '<span class="badge ' + badge + '">' + f.status + '</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;">' +
        '<div class="kpi-card"><div class="kpi-label">Target</div><div class="kpi-value">' + fmtCompact(f.target) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">Raised</div><div class="kpi-value">' + fmtCompact(f.raised) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">Called</div><div class="kpi-value">' + fmtCompact(f.called) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">NAV</div><div class="kpi-value">' + fmtCompact(f.nav) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">IRR</div><div class="kpi-value" style="color:' + (f.irr ? 'var(--brand)' : 'var(--muted)') + ';">' + irr + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">MOIC</div><div class="kpi-value">' + f.moic.toFixed(2) + 'x</div></div>' +
      '</div>' +
      '<h3 style="margin:0 0 10px;font-size:15px;">Portfolio companies</h3>' +
      '<div style="display:grid;grid-template-columns:1fr;gap:10px;">' + companies + '</div>';

      Portal.drawer({ title: 'Fund details', body: body });
    }
  </script>
</body>
</html>
