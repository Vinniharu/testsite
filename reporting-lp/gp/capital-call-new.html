<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Capital Call · NEIIA</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/portal.css">
</head>
<body>
  <div class="portal-shell">
    <aside id="sb" class="portal-sidebar"></aside>
    <div class="portal-main">
      <header id="hdr" class="portal-header"></header>
      <div class="portal-content">
        <div style="margin-bottom:20px;">
          <a href="capital-calls.html" style="color:var(--muted);font-size:13px;">← Back to capital activity</a>
          <h1 style="margin:8px 0 0;font-size:24px;">New capital call</h1>
        </div>

        <div class="stepper" style="margin-bottom:28px;max-width:760px;">
          <div style="display:flex;align-items:center;gap:6px;"><span class="step-num active" id="sn-1">1</span><span class="step-label active">Select fund</span></div>
          <div class="step-bar" id="sb-1"></div>
          <div style="display:flex;align-items:center;gap:6px;"><span class="step-num" id="sn-2">2</span><span class="step-label">Amount & purpose</span></div>
          <div class="step-bar" id="sb-2"></div>
          <div style="display:flex;align-items:center;gap:6px;"><span class="step-num" id="sn-3">3</span><span class="step-label">Select LPs</span></div>
          <div class="step-bar" id="sb-3"></div>
          <div style="display:flex;align-items:center;gap:6px;"><span class="step-num" id="sn-4">4</span><span class="step-label">Preview</span></div>
        </div>

        <div class="card card-p" id="step-1">
          <h2 style="margin:0 0 14px;font-size:18px;">Select fund</h2>
          <div id="fund-choices" style="display:flex;flex-direction:column;gap:10px;"></div>
        </div>

        <div class="card card-p" id="step-2" style="display:none;">
          <h2 style="margin:0 0 14px;font-size:18px;">Amount & purpose</h2>
          <label style="display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;">Amount</label>
          <input id="amt" type="text" placeholder="$2,500,000" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:14px;">

          <label style="display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;">Due date</label>
          <input id="due" type="date" value="2026-07-15" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:14px;">

          <label style="display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;">Purpose</label>
          <textarea id="purpose" rows="3" placeholder="Follow-on into…" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;">Follow-on into Solara Energy Series A+ extension.</textarea>
        </div>

        <div class="card card-p" id="step-3" style="display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <h2 style="margin:0;font-size:18px;">Select LPs</h2>
            <button class="btn btn-secondary btn-sm" id="toggle-all">Toggle all</button>
          </div>
          <div style="background:var(--surface);padding:12px;border-radius:8px;margin-bottom:14px;font-size:14px;">
            <span id="sel-summary" style="font-weight:600;color:var(--ink);"></span>
          </div>
          <div style="overflow:auto;max-height:420px;">
            <table class="tbl">
              <thead><tr><th></th><th>Name</th><th>Type</th><th>Commitment</th><th>Pro-rata</th></tr></thead>
              <tbody id="lp-tbody"></tbody>
            </table>
          </div>
        </div>

        <div class="card card-p" id="step-4" style="display:none;">
          <h2 style="margin:0 0 14px;font-size:18px;">Preview & confirm</h2>
          <div id="preview-summary" style="background:var(--brand-50);border-radius:8px;padding:14px;margin-bottom:14px;color:var(--brand);font-weight:600;"></div>
          <div style="overflow:auto;max-height:320px;margin-bottom:16px;">
            <table class="tbl">
              <thead><tr><th>LP</th><th>Commitment</th><th>Pro-rata $</th></tr></thead>
              <tbody id="preview-tbody"></tbody>
            </table>
          </div>
          <div class="card" style="padding:14px;background:var(--surface);margin-bottom:14px;">
            <h3 style="margin:0 0 8px;font-size:14px;">Wire instructions</h3>
            <div id="bank-info" style="font-size:13px;line-height:1.7;color:var(--body);"></div>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:14px;" id="fee-note"></div>
        </div>

        <div style="display:flex;justify-content:space-between;margin-top:20px;max-width:none;">
          <button class="btn btn-secondary" id="back-btn" style="visibility:hidden;">← Back</button>
          <button class="btn btn-primary" id="next-btn">Continue →</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrap"></div>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/portal.js"></script>
  <script>
    Portal.init({ role: 'gp', activeNav: 'capital-calls' });

    function fmtCompact(n) {
      if (n >= 1e6) return '$' + (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + (n || 0).toLocaleString();
    }
    function fmtFull(n) { return '$' + Math.round(n || 0).toLocaleString(); }

    let step = 1;
    let selectedFund = NEIIA_DATA.funds[0];
    let selectedLps = NEIIA_DATA.personas.lp.map(function (l) { return l.id; });

    // Step 1 — fund cards
    const fc = document.getElementById('fund-choices');
    fc.innerHTML = NEIIA_DATA.funds.map(function (f) {
      return '<label class="card card-p" style="display:flex;align-items:center;gap:14px;cursor:pointer;border-color:' + (f.id === selectedFund.id ? 'var(--brand)' : 'var(--border)') + ';" data-fund="' + f.id + '">' +
        '<input type="radio" name="fund" value="' + f.id + '" ' + (f.id === selectedFund.id ? 'checked' : '') + '>' +
        '<div style="flex:1;"><div style="font-weight:700;color:var(--ink);">' + f.name + '</div>' +
        '<div style="font-size:12px;color:var(--muted);">Vintage ' + f.vintage + ' · ' + f.strategy + '</div></div>' +
        '<div style="text-align:right;font-size:13px;"><div style="font-weight:700;">' + fmtCompact(f.raised) + ' raised</div>' +
        '<div style="color:var(--muted);">' + f.companies.length + ' companies</div></div>' +
      '</label>';
    }).join('');
    fc.addEventListener('change', function (e) {
      selectedFund = NEIIA_DATA.funds.find(function (f) { return f.id === e.target.value; });
      document.querySelectorAll('#fund-choices label').forEach(function (l) {
        l.style.borderColor = l.dataset.fund === selectedFund.id ? 'var(--brand)' : 'var(--border)';
      });
    });

    // Step 3 — LP table
    function renderLpTable() {
      const amt = parseAmount(document.getElementById('amt').value);
      const totalCommit = NEIIA_DATA.personas.lp.reduce(function (s, l) { return s + l.commitment; }, 0);
      document.getElementById('lp-tbody').innerHTML = NEIIA_DATA.personas.lp.map(function (lp) {
        const checked = selectedLps.includes(lp.id) ? 'checked' : '';
        const prorata = amt * (lp.commitment / totalCommit);
        return '<tr><td><input type="checkbox" class="lp-cb" value="' + lp.id + '" ' + checked + '></td>' +
          '<td><b style="color:var(--ink);">' + lp.name + '</b></td>' +
          '<td><span class="chip">' + lp.type + '</span></td>' +
          '<td>' + fmtCompact(lp.commitment) + '</td>' +
          '<td style="color:var(--brand);font-weight:600;">' + fmtFull(prorata) + '</td>' +
        '</tr>';
      }).join('');
      updateSummary();
      document.querySelectorAll('.lp-cb').forEach(function (cb) {
        cb.addEventListener('change', function () {
          if (cb.checked) selectedLps.push(cb.value);
          else selectedLps = selectedLps.filter(function (x) { return x !== cb.value; });
          updateSummary();
        });
      });
    }

    function updateSummary() {
      const amt = parseAmount(document.getElementById('amt').value);
      const totalCommit = NEIIA_DATA.personas.lp.reduce(function (s, l) { return s + l.commitment; }, 0);
      const sumProrata = NEIIA_DATA.personas.lp.filter(function (l) { return selectedLps.includes(l.id); }).reduce(function (s, l) { return s + amt * (l.commitment / totalCommit); }, 0);
      document.getElementById('sel-summary').textContent = selectedLps.length + ' LPs selected · ' + fmtFull(sumProrata) + ' total at pro-rata';
    }

    function parseAmount(s) {
      const n = Number((s || '').replace(/[^\d.]/g, ''));
      return isNaN(n) ? 0 : n;
    }
    document.getElementById('amt').addEventListener('blur', function (e) {
      const n = parseAmount(e.target.value);
      e.target.value = n ? '$' + n.toLocaleString() : '';
    });
    document.getElementById('toggle-all').addEventListener('click', function () {
      if (selectedLps.length === NEIIA_DATA.personas.lp.length) selectedLps = [];
      else selectedLps = NEIIA_DATA.personas.lp.map(function (l) { return l.id; });
      renderLpTable();
    });

    function renderPreview() {
      const amt = parseAmount(document.getElementById('amt').value);
      const totalCommit = NEIIA_DATA.personas.lp.reduce(function (s, l) { return s + l.commitment; }, 0);
      const chosen = NEIIA_DATA.personas.lp.filter(function (l) { return selectedLps.includes(l.id); });
      const totalPro = chosen.reduce(function (s, l) { return s + amt * (l.commitment / totalCommit); }, 0);
      document.getElementById('preview-summary').textContent = 'Capital Call #8 · ' + selectedFund.name + ' · ' + chosen.length + ' LPs · ' + fmtFull(totalPro) + ' total pro-rata';
      document.getElementById('preview-tbody').innerHTML = chosen.map(function (l) {
        const pr = amt * (l.commitment / totalCommit);
        return '<tr><td><b>' + l.name + '</b></td><td>' + fmtCompact(l.commitment) + '</td><td style="color:var(--brand);font-weight:600;">' + fmtFull(pr) + '</td></tr>';
      }).join('');

      const bank = NEIIA_DATA.capitalCalls.find(function (c) { return c.id === 'cc-7'; }).bank;
      document.getElementById('bank-info').innerHTML =
        '<div><b>Bank:</b> ' + bank.name + '</div>' +
        '<div><b>Account name:</b> ' + bank.account + '</div>' +
        '<div><b>Account number:</b> ' + bank.accountNumber + '</div>' +
        '<div><b>SWIFT:</b> ' + bank.swift + '</div>' +
        '<div><b>Reference:</b> ' + bank.reference + '</div>';

      document.getElementById('fee-note').textContent =
        'This capital call will be billed at $15 × ' + chosen.length + ' LPs = $' + (15 * chosen.length) + ' in transaction fees.';
    }

    function showStep(n) {
      step = n;
      [1, 2, 3, 4].forEach(function (i) {
        document.getElementById('step-' + i).style.display = i === n ? 'block' : 'none';
        const sn = document.getElementById('sn-' + i);
        sn.classList.remove('active', 'done');
        if (i < n) sn.classList.add('done');
        if (i === n) sn.classList.add('active');
        if (i < 4) document.getElementById('sb-' + i).classList.toggle('done', i < n);
      });
      document.getElementById('back-btn').style.visibility = n === 1 ? 'hidden' : 'visible';
      document.getElementById('next-btn').textContent = n === 4 ? 'Confirm and send' : 'Continue →';

      if (n === 3) renderLpTable();
      if (n === 4) renderPreview();
    }

    document.getElementById('next-btn').addEventListener('click', function () {
      if (step === 4) {
        Portal.toast('Capital Call #8 sent to ' + selectedLps.length + ' LPs');
        setTimeout(function () { window.location.href = 'capital-calls.html'; }, 1200);
        return;
      }
      showStep(step + 1);
    });
    document.getElementById('back-btn').addEventListener('click', function () { showStep(step - 1); });

    showStep(1);
  </script>
</body>
</html>
