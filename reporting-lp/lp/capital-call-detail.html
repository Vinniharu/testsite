<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Call · NEIIA</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/portal.css">
</head>
<body>
  <div class="portal-shell">
    <aside id="sb" class="portal-sidebar"></aside>
    <div class="portal-main">
      <header id="hdr" class="portal-header"></header>
      <div class="portal-content">
        <div style="margin-bottom:14px;"><a href="capital-activity.html" style="color:var(--muted);font-size:13px;">← Back to capital activity</a></div>

        <div id="content"></div>
      </div>
    </div>
  </div>

  <div class="toast-wrap"></div>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/portal.js"></script>
  <script>
    Portal.init({ role: 'lp', activeNav: 'capital-activity' });

    function fmtCompact(n) {
      if (n >= 1e6) return '$' + (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + (n || 0).toLocaleString();
    }
    function fmtFull(n) { return '$' + (n || 0).toLocaleString(); }

    const params = new URLSearchParams(location.search);
    const id = params.get('id') || 'cc-7';
    const cc = NEIIA_DATA.capitalCalls.find(function (c) { return c.id === id; });
    const fund = NEIIA_DATA.funds.find(function (f) { return f.id === cc.fundId; });
    const tundeShare = cc.tundeShare != null ? cc.tundeShare : Math.round(cc.amount * (200000 / 30000000));
    const tundeCommit = 200000; // for f-1
    const badge = cc.status === 'Open' ? 'badge-amber' : 'badge-green';
    const lpId = 'lp-1';
    const ref = (cc.bank ? cc.bank.reference : 'CC-' + cc.number + '-LP-{LPID}').replace('{LPID}', lpId);
    const bank = cc.bank || { name: 'Stanbic IBTC', account: fund.name + ' – Capital Account', accountNumber: '0123456789', swift: 'SBICNGLX' };

    const signed = NEIIA_STATE.signedCalls.includes(id);

    document.getElementById('content').innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:12px;">' +
        '<div><div style="display:flex;gap:8px;align-items:center;"><span class="badge ' + badge + '">' + cc.status + '</span><span style="font-size:13px;color:var(--muted);">' + fund.name + '</span></div>' +
        '<h1 style="margin:6px 0 0;font-size:24px;">Capital Call #' + cc.number + '</h1>' +
        '<div style="font-size:14px;color:var(--muted);margin-top:4px;">Issued ' + cc.issued + ' · Due <b style="color:var(--ink);">' + cc.due + '</b></div></div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
          '<button class="btn btn-secondary">' + Portal.icon('download', 14) + ' Download PDF</button>' +
          '<button id="ask-btn" class="btn btn-secondary">' + Portal.icon('message-square', 14) + ' Ask a question</button>' +
          (signed
            ? '<button class="btn btn-secondary" disabled style="color:var(--brand);">' + Portal.icon('check', 14) + ' Acknowledged</button>'
            : '<button id="sign-btn" class="btn btn-primary">' + Portal.icon('check', 14) + ' Acknowledge receipt</button>') +
        '</div>' +
      '</div>' +

      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;" class="kpi-row">' +
        '<div class="kpi-card"><div class="kpi-label">Call amount (fund)</div><div class="kpi-value">' + fmtCompact(cc.amount) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">Your pro-rata share</div><div class="kpi-value" style="color:var(--brand);">' + fmtFull(tundeShare) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">Days until due</div><div class="kpi-value">' + Math.max(0, Math.round((new Date(cc.due) - new Date()) / 86400000)) + '</div></div>' +
      '</div>' +

      '<div class="card card-p" style="margin-bottom:14px;">' +
        '<h3 style="margin:0 0 8px;font-size:15px;">Purpose</h3>' +
        '<p style="margin:0;color:var(--body);">' + cc.purpose + '</p>' +
      '</div>' +

      '<div class="card card-p" style="margin-bottom:14px;">' +
        '<h3 style="margin:0 0 10px;font-size:15px;">Your pro-rata calculation</h3>' +
        '<div style="font-size:14px;color:var(--body);line-height:1.8;">' +
          'Your commitment to ' + fund.name + ': <b style="color:var(--ink);">' + fmtFull(tundeCommit) + '</b><br>' +
          'Fund total raised: <b style="color:var(--ink);">' + fmtCompact(fund.raised) + '</b><br>' +
          'Capital call amount: <b style="color:var(--ink);">' + fmtCompact(cc.amount) + '</b><br>' +
          'Your share: 10% of $250K commitment = <b style="color:var(--brand);">' + fmtFull(tundeShare) + '</b>' +
        '</div>' +
      '</div>' +

      '<div class="card card-p" style="margin-bottom:14px;">' +
        '<h3 style="margin:0 0 10px;font-size:15px;">Wire instructions</h3>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;" class="wire-grid">' +
          '<div><div style="color:var(--muted);text-transform:uppercase;font-size:11px;">Bank</div><div style="font-weight:600;color:var(--ink);">' + bank.name + '</div></div>' +
          '<div><div style="color:var(--muted);text-transform:uppercase;font-size:11px;">Account name</div><div style="font-weight:600;color:var(--ink);">' + bank.account + '</div></div>' +
          '<div><div style="color:var(--muted);text-transform:uppercase;font-size:11px;">Account number</div><div style="font-weight:600;color:var(--ink);font-family:monospace;">' + bank.accountNumber + '</div></div>' +
          '<div><div style="color:var(--muted);text-transform:uppercase;font-size:11px;">SWIFT</div><div style="font-weight:600;color:var(--ink);font-family:monospace;">' + bank.swift + '</div></div>' +
          '<div style="grid-column:1/-1;"><div style="color:var(--muted);text-transform:uppercase;font-size:11px;">Reference (use exactly)</div><div style="font-weight:600;color:var(--brand);font-family:monospace;background:var(--brand-50);padding:6px 10px;border-radius:6px;display:inline-block;margin-top:4px;">' + ref + '</div></div>' +
        '</div>' +
      '</div>' +

      '<div class="card card-p">' +
        '<h3 style="margin:0 0 10px;font-size:15px;">Documents</h3>' +
        '<div id="docs-list"></div>' +
      '</div>';

    const callDocs = NEIIA_DATA.documents.filter(function (d) { return d.folder === 'Capital Calls'; });
    document.getElementById('docs-list').innerHTML = callDocs.map(function (d) {
      return '<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F1F5F9;">' +
        '<div style="display:flex;align-items:center;gap:10px;">' + Portal.icon('file', 18) + '<span style="font-weight:600;color:var(--ink);">' + d.name + '</span><span style="color:var(--muted);font-size:12px;">' + d.size + '</span></div>' +
        '<button class="btn btn-ghost btn-sm">' + Portal.icon('download', 14) + ' Download</button>' +
      '</div>';
    }).join('') || '<div style="color:var(--muted);font-size:13px;">No documents attached.</div>';

    const askBtn = document.getElementById('ask-btn');
    if (askBtn) askBtn.addEventListener('click', function () {
      const body = document.createElement('div');
      body.innerHTML = '<label style="font-size:13px;font-weight:600;">Subject</label>' +
        '<input value="Re: Capital Call #' + cc.number + '" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:8px;margin:4px 0 12px;">' +
        '<label style="font-size:13px;font-weight:600;">Message</label>' +
        '<textarea rows="4" placeholder="Your question…" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:8px;margin-top:4px;"></textarea>';
      Portal.modal({
        title: 'Send a question',
        body: body,
        primary: { label: 'Send', onClick: function () { Portal.toast('Message sent to Chinedu Bello'); } }
      });
    });

    const signBtn = document.getElementById('sign-btn');
    if (signBtn) signBtn.addEventListener('click', function () {
      const body = document.createElement('div');
      body.innerHTML = '<p style="margin:0 0 10px;">By signing below you acknowledge receipt of Capital Call #' + cc.number + ' for <b>' + fmtFull(tundeShare) + '</b>.</p>' +
        '<label style="font-size:13px;font-weight:600;">Type your full name to sign</label>' +
        '<input id="sig-name" placeholder="Tunde Adeyemi" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-top:4px;font-family:Georgia,serif;font-size:16px;">';
      Portal.modal({
        title: 'Acknowledge receipt',
        body: body,
        primary: {
          label: 'Sign and acknowledge',
          onClick: function (close) {
            const val = body.querySelector('#sig-name').value.trim();
            if (val.length < 6) { Portal.toast('Please type your full name', 'error'); return false; }
            NEIIA_STATE.addSignedCall(id);
            close();
            Portal.toast('Capital call acknowledged');
            setTimeout(function () { location.reload(); }, 600);
          }
        }
      });
    });
  </script>
  <style>
    @media (max-width: 800px) {
      .kpi-row { grid-template-columns: 1fr !important; }
      .wire-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</body>
</html>
