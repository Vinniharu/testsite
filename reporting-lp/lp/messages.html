<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages · NEIIA</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/portal.css">
</head>
<body>
  <div class="portal-shell">
    <aside id="sb" class="portal-sidebar"></aside>
    <div class="portal-main">
      <header id="hdr" class="portal-header"></header>
      <div class="portal-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <div><h1 style="margin:0;font-size:24px;">Messages</h1>
            <p style="margin:4px 0 0;color:var(--muted);">Secure messaging with your fund managers.</p></div>
          <button class="btn btn-primary" id="new-btn"></button>
        </div>

        <div style="display:grid;grid-template-columns:320px 1fr;gap:0;border:1px solid var(--border);border-radius:12px;background:white;height:calc(100vh - 180px);overflow:hidden;" class="comm-grid">
          <div style="border-right:1px solid var(--border);overflow-y:auto;" id="thread-list"></div>
          <div id="thread-view" style="display:flex;flex-direction:column;overflow:hidden;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrap"></div>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/portal.js"></script>
  <script>
    Portal.init({ role: 'lp', activeNav: 'messages' });
    document.getElementById('new-btn').innerHTML = Portal.icon('plus', 16) + ' New message';

    document.getElementById('new-btn').addEventListener('click', function () {
      const userId = (NEIIA_STATE.currentUser && NEIIA_STATE.currentUser.id) || 'lp-1';
      const contacts = (NEIIA_DATA.contactsFor && NEIIA_DATA.contactsFor('lp', userId)) || [];
      if (contacts.length) {
        Portal.openContactPicker({
          role: 'lp', userId: userId,
          onPick: function (c) {
            if (!c) return;
            Portal.toast('Opening message composer with ' + c.name + '…', 'success');
          }
        });
        return;
      }
      // Fallback: list all GPs as contacts
      const gpList = (NEIIA_DATA.personas.gp || []);
      const body = document.createElement('div');
      body.innerHTML =
        '<input id="cp-search" placeholder="Search GPs by name or firm…" autofocus style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;">' +
        '<div id="cp-list" style="max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;"></div>' +
        '<a href="#" id="cp-bypass" style="display:block;margin-top:10px;font-size:13px;color:var(--brand);font-weight:600;">Compose anyway (free text) →</a>';
      function rndr(q) {
        const ql = (q || '').toLowerCase();
        const filt = gpList.filter(function (g) { return (g.name + ' ' + g.firm + ' ' + (g.role || '')).toLowerCase().indexOf(ql) > -1; });
        body.querySelector('#cp-list').innerHTML = filt.length ? filt.map(function (g) {
          return '<div class="cp-row" data-id="' + g.id + '" style="padding:10px 12px;border-bottom:1px solid #F1F5F9;display:flex;gap:10px;align-items:center;cursor:pointer;">' +
            '<span class="avatar avatar-sm">' + g.initials + '</span>' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-weight:600;color:var(--ink);font-size:13px;">' + g.name + '</div>' +
              '<div style="font-size:12px;color:var(--muted);">' + g.role + ' · ' + g.firm + '</div>' +
            '</div>' +
          '</div>';
        }).join('') : '<div style="padding:20px;text-align:center;color:var(--muted);">No matches.</div>';
        body.querySelectorAll('.cp-row').forEach(function (r) {
          r.addEventListener('click', function () {
            const g = gpList.find(function (x) { return x.id === r.dataset.id; });
            inst.close();
            Portal.toast('Opening message composer with ' + (g ? g.name : 'recipient') + '…', 'success');
          });
        });
      }
      const inst = Portal.modal({ title: 'Pick recipient', body: body, primary: null, secondary: { label: 'Close' } });
      setTimeout(function () {
        rndr('');
        body.querySelector('#cp-search').addEventListener('input', function (e) { rndr(e.target.value); });
        body.querySelector('#cp-bypass').addEventListener('click', function (e) {
          e.preventDefault(); inst.close();
          Portal.toast('Composing free-text message…', 'success');
        });
      }, 0);
    });

    const realThread = NEIIA_DATA.messages;
    const stubs = [
      { id: 't-9', who: 'Adaobi Okonkwo', initials: 'AO', subject: 'Distribution Q3 notice', preview: 'Quick heads up — Q3 distribution timing will…', when: '4d ago' }
    ];
    let selectedId = realThread.threadId;

    function renderList() {
      const items = [
        { id: realThread.threadId, who: 'Chinedu Bello', initials: 'CB', subject: realThread.subject, preview: realThread.messages[realThread.messages.length - 1].body, when: '2d ago', real: true }
      ].concat(stubs);

      document.getElementById('thread-list').innerHTML = items.map(function (t) {
        return '<div class="thread-row" data-id="' + t.id + '" style="padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;' + (t.id === selectedId ? 'background:var(--brand-50);' : '') + '">' +
          '<span class="avatar avatar-sm">' + t.initials + '</span>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;justify-content:space-between;font-size:13px;"><b style="color:var(--ink);">' + t.who + '</b><span style="color:var(--muted);font-size:12px;">' + t.when + '</span></div>' +
            '<div style="font-size:13px;color:var(--ink);font-weight:500;margin-top:2px;">' + t.subject + '</div>' +
            '<div style="font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + t.preview + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
      document.querySelectorAll('.thread-row').forEach(function (r) {
        r.addEventListener('click', function () { selectedId = r.dataset.id; renderList(); renderThread(); });
      });
    }

    function renderThread() {
      let html;
      if (selectedId === realThread.threadId) {
        const bubbles = realThread.messages.map(function (m) {
          const isLp = m.from.startsWith('lp-');
          return '<div style="display:flex;gap:10px;margin-bottom:16px;' + (isLp ? 'flex-direction:row-reverse;' : '') + '">' +
            '<span class="avatar avatar-md ' + (isLp ? '' : 'avatar-slate') + '">' + m.initials + '</span>' +
            '<div style="flex:1;max-width:70%;">' +
              '<div style="display:flex;gap:8px;align-items:baseline;font-size:12px;color:var(--muted);margin-bottom:4px;' + (isLp ? 'justify-content:flex-end;' : '') + '">' +
                '<b style="color:var(--ink);">' + m.name + '</b>' + m.when +
              '</div>' +
              '<div style="background:' + (isLp ? 'var(--brand-50)' : 'var(--surface)') + ';border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.5;color:var(--ink);">' + m.body + '</div>' +
            '</div>' +
          '</div>';
        }).join('');
        const tags = realThread.tags.map(function (g) { return '<span class="chip">' + g + '</span>'; }).join(' ');
        html = '<div style="padding:16px 20px;border-bottom:1px solid var(--border);">' +
          '<div style="font-weight:700;color:var(--ink);font-size:15px;">' + realThread.subject + '</div>' +
          '<div style="font-size:12px;color:var(--muted);margin-top:2px;">With Chinedu Bello</div>' +
          '<div style="margin-top:8px;display:flex;gap:6px;">' + tags + '</div>' +
        '</div>' +
        '<div style="flex:1;overflow-y:auto;padding:20px;">' + bubbles + '</div>';
      } else {
        const stub = stubs.find(function (s) { return s.id === selectedId; });
        html = '<div style="padding:16px 20px;border-bottom:1px solid var(--border);">' +
          '<div style="font-weight:700;color:var(--ink);font-size:15px;">' + stub.subject + '</div>' +
          '<div style="font-size:12px;color:var(--muted);margin-top:2px;">With ' + stub.who + '</div></div>' +
          '<div style="flex:1;overflow-y:auto;padding:20px;">' +
            '<div style="display:flex;gap:10px;margin-bottom:16px;">' +
              '<span class="avatar avatar-md">' + stub.initials + '</span>' +
              '<div style="flex:1;"><div style="font-size:12px;color:var(--muted);margin-bottom:4px;"><b style="color:var(--ink);">' + stub.who + '</b> ' + stub.when + '</div>' +
              '<div style="background:var(--surface);border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.5;color:var(--ink);">' + stub.preview + ' We expect to wire by mid-October. Let me know if you have any questions.</div></div>' +
            '</div>' +
          '</div>';
      }
      html += '<div style="border-top:1px solid var(--border);padding:14px;display:flex;gap:8px;align-items:flex-end;">' +
        '<textarea placeholder="Type a reply…" rows="2" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;resize:none;"></textarea>' +
        '<button class="btn btn-primary" onclick="Portal.toast(\'Message sent\')">Send</button>' +
      '</div>';
      document.getElementById('thread-view').innerHTML = html;
    }

    renderList();
    renderThread();
  </script>
  <style>
    @media (max-width: 900px) {
      .comm-grid { grid-template-columns: 1fr !important; height: auto !important; }
    }
  </style>
</body>
</html>
